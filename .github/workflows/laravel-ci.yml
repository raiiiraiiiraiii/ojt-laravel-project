name: Laravel CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  laravel-tests:
    name: Laravel Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: kayapa_test
          MYSQL_USER: kayapa
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql, redis, zip, gd, bcmath, intl, pcntl
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            cp .env.docker.example .env
          fi

      - name: Configure environment
        run: |
          php artisan key:generate
          php artisan config:clear
        env:
          APP_ENV: testing
          APP_DEBUG: true
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kayapa_test
          DB_USERNAME: kayapa
          DB_PASSWORD: secret
          CACHE_STORE: database
          SESSION_DRIVER: database
          QUEUE_CONNECTION: database
          REDIS_HOST: 127.0.0.1

      - name: Run migrations
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kayapa_test
          DB_USERNAME: kayapa
          DB_PASSWORD: secret
          CACHE_STORE: database
          SESSION_DRIVER: database
          QUEUE_CONNECTION: database
          REDIS_HOST: 127.0.0.1

      - name: Run tests
        run: php artisan test
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kayapa_test
          DB_USERNAME: kayapa
          DB_PASSWORD: secret
          CACHE_STORE: database
          SESSION_DRIVER: database
          QUEUE_CONNECTION: database
          REDIS_HOST: 127.0.0.1